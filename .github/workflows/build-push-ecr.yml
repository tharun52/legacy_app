name: Build and Push to ECR

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - 'containerize/**'
  pull_request:
    branches:
      - main
  workflow_dispatch: # allow manual runs from the Actions tab

# ── Global env ────────────────────────────────────────────────────────────────
env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: legacy-app
  IMAGE_NAME: legacy-app

jobs:
  build-and-push:
    name: Build & Push Docker Image to ECR
    runs-on: test_runner

    steps:
      # ── 1. Checkout source code from the current branch ─────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Configure AWS credentials using the EC2 instance role ────────────
      #       No static keys — relies on the IAM role attached to the runner
      - name: Configure AWS credentials (EC2 instance role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}

      # ── 3. Create ECR repository if it does not already exist ───────────────
      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories \
            --repository-names ${{ env.ECR_REPOSITORY }} \
            --region ${{ env.AWS_REGION }} \
          || aws ecr create-repository \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --region ${{ env.AWS_REGION }} \
            --image-scanning-configuration scanOnPush=true \
            --encryption-configuration encryptionType=AES256
          echo "ECR_REGISTRY=$(aws ecr describe-repositories \
            --repository-names ${{ env.ECR_REPOSITORY }} \
            --region ${{ env.AWS_REGION }} \
            --query 'repositories[0].repositoryUri' \
            --output text | sed 's|/.*||')" >> $GITHUB_ENV

      # ── 4. Authenticate Docker to Amazon ECR ────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 5. Build, tag and push the Docker image ──────────────────────────────
      #       Tags: git commit SHA (immutable) + latest (mutable)
      - name: Build, tag and push image
        id: build-push
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          FULL_IMAGE="$REGISTRY/${{ env.ECR_REPOSITORY }}"

          echo "Building image: $FULL_IMAGE:$IMAGE_TAG"

          # Build once, tag twice
          docker build \
            --tag $FULL_IMAGE:$IMAGE_TAG \
            --tag $FULL_IMAGE:latest \
            --file Dockerfile \
            .

          echo "Pushing $FULL_IMAGE:$IMAGE_TAG"
          docker push $FULL_IMAGE:$IMAGE_TAG

          echo "Pushing $FULL_IMAGE:latest"
          docker push $FULL_IMAGE:latest

          # Expose the full image URI as a job output
          echo "image=$FULL_IMAGE:$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "registry=$REGISTRY" >> $GITHUB_OUTPUT

      # ── 6. Print image summary ───────────────────────────────────────────────
      - name: Print image details
        run: |
          echo "========================================="
          echo "  Image pushed successfully!"
          echo "  URI : ${{ steps.build-push.outputs.image }}"
          echo "  Also tagged as: ${{ steps.build-push.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest"
          echo "========================================="
